name: SEJO SDK Release

on:
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish to PyPI after validation"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check .

      - name: Run tests
        run: pytest --cov=SEJO_SDK --cov-report=term-missing

      - name: Compile Python files
        run: python -m compileall SEJO_SDK tests examples

      - name: Build docs
        run: mkdocs build --strict

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sejo-sdk-dist
          path: dist/*

  publish:
    if: ${{ inputs.publish_pypi }}
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: sejo-sdk-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
